{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row">
	<div class="col-lg-8 mx-auto">
		<article class="card">
			<div class="card-header">
				<h1 class="card-title text-light">{% if edit_mode %}Edit Comment{% else %}Add Comment{% endif %}</h1>
			</div>
			<div class="card-body">
				<form method="post">
					{% csrf_token %}
					{{ form|crispy }}
					<button type="submit" class="btn btn-primary">{% if edit_mode %}Update Comment{% else %}Post Comment{% endif %}</button>
					<a href="{% url 'posts:post_detail' post.pk %}" class="btn btn-secondary">Cancel</a>
				</form>
			</div>
		</article>
	</div>
</div>
{% endblock %}
